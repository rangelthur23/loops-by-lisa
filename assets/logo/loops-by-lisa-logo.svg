<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-label="Loops by Lisa handmade with heart logo">
  <title>Loops by Lisa handmade with heart logo</title>
  <defs>
    <path id="bottomArc" d="M260 780 A420 420 0 0 0 940 780" />
  </defs>
  <rect width="1200" height="1200" fill="none" />

  <!-- circular cord border -->
  <circle cx="600" cy="600" r="480" fill="none" stroke="#111111" stroke-width="16" />
  <circle cx="600" cy="600" r="452" fill="none" stroke="#111111" stroke-width="8" />

  <!-- top beads -->
  <circle cx="480" cy="105" r="62" fill="#ffffff" stroke="#111111" stroke-width="12" />
  <circle cx="600" cy="88" r="74" fill="#ffffff" stroke="#111111" stroke-width="12" />
  <circle cx="720" cy="105" r="62" fill="#ffffff" stroke="#111111" stroke-width="12" />
  <path d="M442 82 C430 94 424 108 423 124" fill="none" stroke="#111111" stroke-width="5" stroke-linecap="round" opacity="0.85" />
  <path d="M560 58 C544 72 536 91 535 112" fill="none" stroke="#111111" stroke-width="5" stroke-linecap="round" opacity="0.85" />
  <path d="M682 82 C670 94 664 108 663 124" fill="none" stroke="#111111" stroke-width="5" stroke-linecap="round" opacity="0.85" />

  <!-- main lettering approximation -->
  <text x="210" y="560" fill="#111111" font-family="Brush Script MT, Segoe Script, Cormorant Garamond, Georgia, serif" font-size="300" font-style="italic" font-weight="700" letter-spacing="-16">Loops</text>
  <text x="388" y="710" fill="#111111" font-family="Cormorant Garamond, Georgia, serif" font-size="100" font-weight="500" letter-spacing="8">BY LISA</text>
  <line x1="350" y1="765" x2="850" y2="765" stroke="#111111" stroke-width="12" />

  <!-- curved tagline -->
  <text fill="#111111" font-family="Montserrat, Arial, sans-serif" font-size="52" letter-spacing="9">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">HANDMADE WITH HEART</textPath>
  </text>

  <!-- bottom heart knot -->
  <g transform="translate(600 1032)">
    <path d="M0 78 C-78 24 -132 -16 -112 -64 C-98 -99 -51 -103 -8 -62 C35 -103 82 -99 96 -64 C116 -16 64 24 0 78 Z" fill="none" stroke="#111111" stroke-width="12" stroke-linejoin="round" />
    <path d="M-72 -36 C-24 -6 26 -4 72 -36" fill="none" stroke="#111111" stroke-width="12" stroke-linecap="round" />
    <path d="M-98 -16 C-52 -50 -20 -50 6 -24" fill="none" stroke="#111111" stroke-width="10" stroke-linecap="round" />
    <path d="M98 -16 C52 -50 20 -50 -6 -24" fill="none" stroke="#111111" stroke-width="10" stroke-linecap="round" />
  </g>
</svg>
